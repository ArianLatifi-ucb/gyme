{% extends "base.html" %}

{% block title %}Add Trainer - GymE{% endblock %}
{% block header_title %}Add Trainer{% endblock %}
{% block header_subtitle %}Create a new trainer profile for the website.{% endblock %}

{% block content %}
<section>
    <h2>Add New Trainer</h2>
    <form method="POST" class="admin-form">
        <label>Name</label><input type="text" name="name" required>
        <label>Speciality / Role</label><input type="text" name="role" required>
        <label>Bio</label><textarea name="bio" required></textarea>
        <label>Photo URL</label><input type="text" name="photo_url" placeholder="/static/images/trainer-afsar.jpg" required>
        <div class="form-actions"><button type="submit" class="btn-primary">Save Trainer</button><a href="{{ url_for('admin_staff') }}"><button type="button" class="btn-secondary">Cancel</button></a></div>
    </form>
</section>
{% endblock %}
