{% extends "base.html" %}

{% block title %}Edit Trainer - GymE{% endblock %}
{% block header_title %}Edit Trainer{% endblock %}
{% block header_subtitle %}Update trainer profile details.{% endblock %}

{% block content %}
<section>
    <h2>Edit Trainer</h2>
    <form method="POST" class="admin-form">
        <label>Name</label><input type="text" name="name" value="{{ staff.name }}" required>
        <label>Speciality / Role</label><input type="text" name="role" value="{{ staff.role }}" required>
        <label>Bio</label><textarea name="bio" required>{{ staff.bio }}</textarea>
        <label>Photo URL</label><input type="text" name="photo_url" value="{{ staff.photo_url }}" required>
        <div class="form-actions"><button type="submit" class="btn-primary">Update Trainer</button><a href="{{ url_for('admin_staff') }}"><button type="button" class="btn-secondary">Cancel</button></a></div>
    </form>
</section>
{% endblock %}
